[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q --strict-markers
markers =
    qgis: requires a real QGIS Python interpreter (qgis.core importable). Skipped in headless unit runs.
    ee: hits / mocks Earth Engine call composition (no network).
    net: hits the network. Deselected by default; run with -m net.
    gui: builds Qt widgets; needs an (offscreen) display.
