    function applyLanguage(lang) {
        var i18n = translations[lang] || translations.en;
        var langMap = { pt: "pt-BR", en: "en", fr: "fr", it: "it", es: "es", hi: "hi", zh: "zh-Hans" };
        document.documentElement.lang = langMap[lang] || "en";
        var els = document.querySelectorAll("[data-i18n]");
        for (var i = 0; i < els.length; i++) {
            var key = els[i].getAttribute("data-i18n");
            if (i18n[key]) els[i].innerHTML = i18n[key];
        }
    }

    function detectLang() {
        // QGIS locale is injected by the plugin as a URL fragment (#lang=xx).
        var m = (location.hash || "").match(/lang=([a-z]{2})/i);
        var lang = m ? m[1].toLowerCase() : "";
        if (!lang) {
            var nav = (navigator.language || navigator.userLanguage || "").toLowerCase();
            lang = nav.slice(0, 2);
        }
        return ["pt", "en", "fr", "it", "es", "hi", "zh"].indexOf(lang) !== -1 ? lang : "en";
    }

    applyLanguage(detectLang());
    </script>
